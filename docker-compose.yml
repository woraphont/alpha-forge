version: '3.8'

services:
  # DynamoDB Local — SAA-C03 hands-on: replicate DynamoDB without AWS costs
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: alpha-forge-dynamodb
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 3

  # DynamoDB Admin UI — browse tables at http://localhost:8001
  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    container_name: alpha-forge-dynamodb-admin
    ports:
      - "8001:8001"
    environment:
      DYNAMO_ENDPOINT: http://dynamodb-local:8000
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
    depends_on:
      dynamodb-local:
        condition: service_healthy
