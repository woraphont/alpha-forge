name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('lambdas/analyzer/requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r lambdas/analyzer/requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          PYTHONPATH=lambdas/analyzer pytest tests/ -v --tb=short --cov=lambdas/analyzer --cov-report=term-missing

      - name: Coverage check (>= 80%)
        run: |
          PYTHONPATH=lambdas/analyzer pytest tests/ --cov=lambdas/analyzer --cov-fail-under=80
